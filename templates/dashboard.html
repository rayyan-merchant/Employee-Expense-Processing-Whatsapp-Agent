<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Expense Agent Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap');
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-alt: #22263a;
      --border: #2d3148;
      --text: #e8eaf6;
      --text-muted: #7c8ab8;
      --accent: #4f8ef7;
      --accent-light: #6ba3ff;
      --green: #4caf82;
      --yellow: #f5a623;
      --red: #e05c5c;
      --orange: #f0833a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', Arial, sans-serif;
      letter-spacing: 0;
    }
    header {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 20px clamp(18px, 4vw, 48px);
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .brand { font-size: 22px; font-weight: 600; }
    .meta { color: var(--text-muted); display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: flex-end; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green); display: inline-block; box-shadow: 0 0 0 4px rgba(76,175,130,.15); }
    main { padding: 24px clamp(18px, 4vw, 48px) 48px; }
    .stats { display: grid; grid-template-columns: repeat(4, minmax(160px, 1fr)); gap: 14px; margin-bottom: 22px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 18px; }
    .label { color: var(--text-muted); font-size: 13px; margin-bottom: 8px; }
    .value { font-size: 28px; font-weight: 600; }
    .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); }
    table { width: 100%; min-width: 980px; border-collapse: collapse; }
    th, td { padding: 14px 16px; border-bottom: 1px solid var(--border); text-align: left; font-size: 14px; }
    th { color: var(--text-muted); font-weight: 500; background: var(--surface-alt); position: sticky; top: 0; }
    tr.data-row { cursor: pointer; }
    tr.data-row:hover { background: rgba(79,142,247,.08); }
    .badge { display: inline-flex; align-items: center; min-height: 24px; padding: 3px 9px; border-radius: 999px; font-size: 12px; font-weight: 600; white-space: nowrap; }
    .green { color: #d9ffeb; background: rgba(76,175,130,.22); }
    .yellow { color: #fff0c7; background: rgba(245,166,35,.22); }
    .red { color: #ffdede; background: rgba(224,92,92,.22); }
    .orange { color: #ffe2cc; background: rgba(240,131,58,.22); }
    .muted { color: var(--text-muted); background: rgba(124,138,184,.15); }
    .detail td { color: var(--text-muted); background: #141721; line-height: 1.7; }
    .bar { width: 180px; height: 8px; background: var(--border); border-radius: 999px; overflow: hidden; display: inline-block; vertical-align: middle; margin-left: 8px; }
    .bar span { display: block; height: 100%; background: var(--accent); }
    .empty { display: none; padding: 70px 24px; text-align: center; color: var(--text-muted); border: 1px solid var(--border); border-radius: 8px; background: var(--surface); }
    .empty b { color: var(--text); display: block; margin-top: 10px; font-size: 18px; }
    @media (max-width: 820px) {
      header { align-items: flex-start; flex-direction: column; }
      .meta { justify-content: flex-start; }
      .stats { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">Expense Agent</div>
    <div class="meta"><span>Arad Group</span><span class="dot"></span><span>Last updated: <span id="updated">-</span></span></div>
  </header>
  <main>
    <section class="stats">
      <div class="card"><div class="label">Total Expenses</div><div class="value" id="total">0</div></div>
      <div class="card"><div class="label">Total Amount (₪)</div><div class="value" id="amount">0</div></div>
      <div class="card"><div class="label">Auto-Approved</div><div class="value" id="auto">0</div></div>
      <div class="card"><div class="label">Pending Approval</div><div class="value" id="pending">0</div></div>
    </section>
    <div class="empty" id="empty"><div style="font-size:40px">▣</div><b>No expenses yet.</b><span>Send a receipt to WhatsApp to get started.</span></div>
    <section class="table-wrap" id="tableWrap">
      <table>
        <thead>
          <tr><th>#</th><th>Reference</th><th>Phone</th><th>Amount</th><th>Category</th><th>Vendor</th><th>Date</th><th>Policy</th><th>Priority</th><th>Submitted</th></tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
  </main>
  <script>
    let openId = null;
    const cls = s => ({AUTO_APPROVE:'green', NEEDS_APPROVAL:'yellow', REJECTED:'red', EXCEPTION:'orange', UPLOADED:'green', FAILED:'red', NOT_UPLOADED:'muted', PENDING:'yellow'}[s] || 'muted');
    const phone = p => p ? `...${p.slice(-4)}` : '-';
    const ref = id => id.slice(0, 8).toUpperCase();
    const esc = v => String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));

    async function load() {
      const [expenses, stats] = await Promise.all([fetch('/api/expenses').then(r => r.json()), fetch('/api/stats').then(r => r.json())]);
      document.getElementById('updated').textContent = new Date().toLocaleTimeString();
      document.getElementById('total').textContent = stats.total_expenses;
      document.getElementById('amount').textContent = Number(stats.total_amount_nis).toLocaleString();
      document.getElementById('auto').textContent = stats.by_policy_status.AUTO_APPROVE || 0;
      document.getElementById('pending').textContent = stats.pending_approval_count || 0;
      document.getElementById('empty').style.display = expenses.length ? 'none' : 'block';
      document.getElementById('tableWrap').style.display = expenses.length ? 'block' : 'none';
      const rows = document.getElementById('rows');
      rows.innerHTML = expenses.map((e, i) => {
        const detail = openId === e.id ? `<tr class="detail"><td colspan="10">
          OCR confidence <span class="bar"><span style="width:${Math.round((e.ocr_confidence || 0) * 100)}%"></span></span>
          &nbsp; GL: ${esc(e.gl_account || '-')} &nbsp; Cost center: ${esc(e.cost_center || '-')} &nbsp; Priority doc: ${esc(e.priority_document_id || '-')} &nbsp; Language: ${esc(e.language || '-')}<br>
          ${esc(e.description || 'No description')}
        </td></tr>` : '';
        return `<tr class="data-row" onclick="toggle('${e.id}')"><td>${i + 1}</td><td>${ref(e.id)}</td><td>${phone(e.whatsapp_number)}</td><td>${Number(e.amount).toFixed(2)} ${esc(e.currency)}</td><td>${esc(e.category)}</td><td>${esc(e.vendor || '-')}</td><td>${esc(e.expense_date)}</td><td><span class="badge ${cls(e.policy_status)}">${esc(e.policy_status)}</span></td><td><span class="badge ${cls(e.priority_status)}">${esc(e.priority_status)}</span></td><td>${new Date(e.created_at).toLocaleString()}</td></tr>${detail}`;
      }).join('');
    }
    function toggle(id) { openId = openId === id ? null : id; load(); }
    load();
    setInterval(load, 15000);
  </script>
</body>
</html>
